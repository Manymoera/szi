<!-- templates/index.html -->

<!DOCTYPE html>
<html>

<head>

    <title>SZI Optimization</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

    <div class="container">

        <h1>SZI Optimization System</h1>

        <div class="grid">

            <div class="card">

                <h2>Конфигурация параметров</h2>

                <label>Кол-во ГИА</label>
                <input id="m" value="3">

                <label>Кол-во СЗИ</label>
                <input id="n" value="5">

                <button onclick="generateGrids()">Создать матрицы</button>

                <h3>Импорт данных</h3>

                <input type="file" id="fileInput">
                <button onclick="uploadFile()">Загрузить из файла</button>

                <h3>Матрица A и вектор b</h3>
                <div id="Ab_container"></div>

                <h3>Вектор c</h3>
                <div id="c_container"></div>

                <h3>Вектор d</h3>
                <div id="d_container"></div>

                <label>Коэффициент λ</label>
                <input id="lambda" value="0.5">

                <button onclick="solve()">Запустить расчет</button>

            </div>

            <div class="card">

                <h2>Результаты</h2>

                <p>Оптимальное значение</p>
                <h1 id="resultF">-</h1>

                <p>Выбранные СЗИ</p>
                <h2 id="resultIndices">-</h2>

            </div>

        </div>

    </div>

    <script>

        const defaultA = [
            [15, 10, 5, 4, 3],
            [27, 18, 12, 6, 6],
            [40, 25, 12, 11, 8]
        ];
        const defaultB = [20, 39, 48];
        const defaultC = [90, 76, 30, 35, 30];
        const defaultD = [40, 20, 14, 12, 10];

        function generateGrids() {
            let m = parseInt(document.getElementById("m").value) || 0;
            let n = parseInt(document.getElementById("n").value) || 0;

            // Ab
            let Ab_container = document.getElementById("Ab_container");
            Ab_container.innerHTML = '';
            let tableAb = document.createElement("table");

            // Header row
            let trHeader = document.createElement("tr");
            let thEmpty = document.createElement("th");
            trHeader.appendChild(thEmpty);
            for (let j = 0; j < n; j++) {
                let th = document.createElement("th");
                th.textContent = ``;
                trHeader.appendChild(th);
            }
            let thb = document.createElement("th");
            thb.textContent = "b";
            thb.className = "b-header";
            trHeader.appendChild(thb);
            tableAb.appendChild(trHeader);

            // Data rows
            for (let i = 0; i < m; i++) {
                let tr = document.createElement("tr");
                let thRow = document.createElement("th");
                tr.appendChild(thRow);
                for (let j = 0; j < n; j++) {
                    let td = document.createElement("td");
                    let inp = document.createElement("input");
                    inp.type = "number";
                    inp.id = `A_${i}_${j}`;
                    td.appendChild(inp);
                    tr.appendChild(td);
                }
                let tdB = document.createElement("td");
                tdB.className = "b-cell";
                let inpB = document.createElement("input");
                inpB.type = "number";
                inpB.id = `b_${i}`;
                tdB.appendChild(inpB);
                tr.appendChild(tdB);
                tableAb.appendChild(tr);
            }
            Ab_container.appendChild(tableAb);

            // c
            let c_container = document.getElementById("c_container");
            c_container.innerHTML = '';
            let tableC = document.createElement("table");
            let trCHeader = document.createElement("tr");
            for (let j = 0; j < n; j++) {
                let th = document.createElement("th");
                th.textContent = ``;
                trCHeader.appendChild(th);
            }
            tableC.appendChild(trCHeader);
            let trC = document.createElement("tr");
            for (let j = 0; j < n; j++) {
                let td = document.createElement("td");
                let inp = document.createElement("input");
                inp.type = "number";
                inp.id = `c_${j}`;
                td.appendChild(inp);
                trC.appendChild(td);
            }
            tableC.appendChild(trC);
            c_container.appendChild(tableC);

            // d
            let d_container = document.getElementById("d_container");
            d_container.innerHTML = '';
            let tableD = document.createElement("table");
            let trDHeader = document.createElement("tr");
            for (let j = 0; j < n; j++) {
                let th = document.createElement("th");
                th.textContent = ``;
                trDHeader.appendChild(th);
            }
            tableD.appendChild(trDHeader);
            let trD = document.createElement("tr");
            for (let j = 0; j < n; j++) {
                let td = document.createElement("td");
                let inp = document.createElement("input");
                inp.type = "number";
                inp.id = `d_${j}`;
                td.appendChild(inp);
                trD.appendChild(td);
            }
            tableD.appendChild(trD);
            d_container.appendChild(tableD);
        }

        function setDefaults() {
            let m = 3;
            let n = 5;
            for (let i = 0; i < m; i++) {
                for (let j = 0; j < n; j++) {
                    document.getElementById(`A_${i}_${j}`).value = defaultA[i][j];
                }
                document.getElementById(`b_${i}`).value = defaultB[i];
            }
            for (let j = 0; j < n; j++) {
                document.getElementById(`c_${j}`).value = defaultC[j];
                document.getElementById(`d_${j}`).value = defaultD[j];
            }
        }

        window.onload = () => {
            generateGrids();
            setDefaults();
        };

        // после создания сеток может потребоваться очистить значения
        function clearValues() {
            let m = parseInt(document.getElementById("m").value) || 0;
            let n = parseInt(document.getElementById("n").value) || 0;
            for (let i = 0; i < m; i++) {
                for (let j = 0; j < n; j++) {
                    document.getElementById(`A_${i}_${j}`).value = '';
                }
                document.getElementById(`b_${i}`).value = '';
            }
            for (let j = 0; j < n; j++) {
                document.getElementById(`c_${j}`).value = '';
                document.getElementById(`d_${j}`).value = '';
            }
        }

        function uploadFile() {

            let fileInput = document.getElementById("fileInput")

            let formData = new FormData()
            formData.append("file", fileInput.files[0])

            fetch("/upload", {

                method: "POST",
                body: formData

            })
                .then(r => r.json())
                .then(data => {

                    document.getElementById("m").value = data.m
                    document.getElementById("n").value = data.n
                    document.getElementById("lambda").value = data.lambda

                    generateGrids();

                    let m = data.m;
                    let n = data.n;

                    for (let i = 0; i < m; i++) {
                        for (let j = 0; j < n; j++) {
                            document.getElementById(`A_${i}_${j}`).value = data.A[i][j];
                        }
                        document.getElementById(`b_${i}`).value = data.b[i];
                    }
                    for (let j = 0; j < n; j++) {
                        document.getElementById(`c_${j}`).value = data.c[j];
                        document.getElementById(`d_${j}`).value = data.d[j];
                    }

                })

        }

        function solve() {

            let m = parseInt(document.getElementById("m").value);
            let n = parseInt(document.getElementById("n").value);
            let lam = document.getElementById("lambda").value;

            let A = [];
            for (let i = 0; i < m; i++) {
                let row = [];
                for (let j = 0; j < n; j++) {
                    row.push(document.getElementById(`A_${i}_${j}`).valueAsNumber);
                }
                A.push(row);
            }

            let b = [];
            for (let i = 0; i < m; i++) {
                b.push(document.getElementById(`b_${i}`).valueAsNumber);
            }

            let c = [];
            for (let j = 0; j < n; j++) {
                c.push(document.getElementById(`c_${j}`).valueAsNumber);
            }

            let d = [];
            for (let j = 0; j < n; j++) {
                d.push(document.getElementById(`d_${j}`).valueAsNumber);
            }

            fetch("/solve", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    m: m,
                    n: n,
                    lambda: lam,
                    A: A,
                    b: b,
                    c: c,
                    d: d
                })

            })
                .then(r => r.json())
                .then(data => {

                    if (data.error) {
                        alert(data.error);
                    } else {
                        document.getElementById("resultF").innerText = data.F
                        document.getElementById("resultIndices").innerText = data.indices.join(", ")
                    }

                })

        }

    </script>

</body>

</html>
